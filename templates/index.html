<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        AI Fake Review Detection System
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <div class="main-container">

        <div class="glass-card">

            <div class="header-section">

                <h1>
                    AI Fake Review Detection
                </h1>

                <p>
                    Advanced Machine Learning Based Review Analyzer
                </p>

            </div>

            <form
                action="/predict"
                method="POST"
            >

                <div class="input-group">

                    <label>
                        Product Review
                    </label>

                    <textarea
                        name="review"
                        placeholder="Write product review here..."
                        required
                    ></textarea>

                </div>

                <div class="grid-container">

                    <div class="input-group">

                        <label>
                            Product Category
                        </label>

                        <select
                            name="category"
                            required
                        >

                            <option value="">
                                Select Category
                            </option>

                            <option>Electronics</option>
                            <option>Mobile</option>
                            <option>Laptop</option>
                            <option>Fashion</option>
                            <option>Beauty</option>
                            <option>Sports</option>
                            <option>Gaming</option>
                            <option>Books</option>
                            <option>Home Appliances</option>
                            <option>Furniture</option>
                            <option>Grocery</option>
                            <option>Health</option>
                            <option>Automobile</option>
                            <option>Toys</option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>
                            Product Rating
                        </label>

                        <select
                            name="rating"
                            required
                        >

                            <option value="">
                                Select Rating
                            </option>

                            <option value="1">
                                ⭐ 1 Star
                            </option>

                            <option value="2">
                                ⭐⭐ 2 Stars
                            </option>

                            <option value="3">
                                ⭐⭐⭐ 3 Stars
                            </option>

                            <option value="4">
                                ⭐⭐⭐⭐ 4 Stars
                            </option>

                            <option value="5">
                                ⭐⭐⭐⭐⭐ 5 Stars
                            </option>

                        </select>

                    </div>

                </div>

                <div class="grid-container">

                    <div class="input-group">

                        <label>
                            Account Age
                        </label>

                        <select
                            name="account_age"
                            required
                        >

                            <option value="">
                                Select Account Age
                            </option>

                            <option value="15">
                                Less than 1 Month
                            </option>

                            <option value="60">
                                1 - 3 Months
                            </option>

                            <option value="180">
                                3 - 6 Months
                            </option>

                            <option value="365">
                                6 Months - 1 Year
                            </option>

                            <option value="730">
                                More than 1 Year
                            </option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>
                            Verified Purchase
                        </label>

                        <select
                            name="verified_purchase"
                            required
                        >

                            <option value="">
                                Select Option
                            </option>

                            <option>
                                Yes
                            </option>

                            <option>
                                No
                            </option>

                        </select>

                    </div>

                </div>

                <div class="grid-container">

                    <div class="input-group">

                        <label>
                            Helpful Votes
                        </label>

                        <input
                            type="number"
                            name="helpful_votes"
                            placeholder="Enter helpful votes"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label>
                            User Review Count
                        </label>

                        <input
                            type="number"
                            name="review_count"
                            placeholder="Enter total reviews"
                            required
                        >

                    </div>

                </div>

                <button type="submit">

                    Analyze Review

                </button>

            </form>

        </div>

    </div>

</body>

</html>
